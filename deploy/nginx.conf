server {
    listen 80;
    server_name booksmartutt.duckdns.org;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name booksmartutt.duckdns.org;

    # ── SSL certificates (managed by Certbot / Let's Encrypt) ────────
    ssl_certificate     /etc/letsencrypt/live/booksmartutt.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/booksmartutt.duckdns.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Server-level timeouts ───────────────────────────────────────
    client_body_timeout 120s;
    client_header_timeout 120s;

    # ── Proxy to FastAPI (Uvicorn on port 8000) ──────────────────────
    # Nginx runs as a separate container, so use the Compose service name.
    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts for HTTP requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Buffering for large responses
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # ── WebSocket upgrade ────────────────────────────────────────────
    location /api/v1/ws {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;   # keep WS alive for 24h
        proxy_send_timeout 86400s;
    }
}
